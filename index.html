<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Harf-Tele — Gestión</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231d4ed8'/%3E%3Crect x='28' y='20' width='44' height='56' rx='6' fill='%23fff'/%3E%3Crect x='38' y='14' width='24' height='12' rx='4' fill='%23bfdbfe'/%3E%3Crect x='34' y='40' width='32' height='4' rx='2' fill='%231d4ed8'/%3E%3Crect x='34' y='52' width='24' height='4' rx='2' fill='%231d4ed8'/%3E%3Crect x='34' y='64' width='20' height='4' rx='2' fill='%231d4ed8'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="ciaber_app.css">
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h2>Harf-Tele</h2>
    <p>Proyectos · Instalaciones · Consultorías</p>
    <input id="l-email" type="email" placeholder="Email"
      onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
    <input id="l-pass" type="password" placeholder="Contraseña"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" id="l-btn" onclick="doLogin()">Ingresar</button>
    <div id="l-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <div class="topbar">
      <h1 class="topbar-logo">Harf-Tele</h1>
      <div class="breadcrumb" id="breadcrumb">
        <span class="cur">Clientes</span>
      </div>
    </div>
    <span class="sync-dot off" id="sync-dot" title="Click para reconectar" onclick="reconectar()"></span>
    <span class="sync-label err" id="sync-label">Sin conexión</span>
    <span class="user-pill" id="user-email"></span>
    <button class="btn-logout" onclick="doLogout()">Salir</button>
  </div>

  <div class="app-content">
    <div class="filtros" style="margin-top:4px">
      <input id="q" placeholder="🔍 Buscar...">
      <select id="filtroEstado" onchange="renderVista()">
        <option value="">📋 Todos los estados</option>
      </select>
      <select id="filtroAbono" onchange="renderVista()" style="display:none">
        <option value="">🔄 Abono / Sin Abono</option>
        <option value="Abono">Abono</option>
        <option value="Sin Abono">Sin Abono</option>
      </select>
      <span id="filtroCount"></span>
    </div>

    <div class="actbar">
      <button class="add-main" id="btn-add" onclick="addItem()">+ Nuevo Cliente</button>
      <button class="sec" onclick="exportJSON()">Backup</button>
      <button id="btn-del-sel" onclick="deleteSelected()">
        🗑 Eliminar seleccionados (<span id="sel-count">0</span>)
      </button>
      <button class="sec" id="btn-undo" onclick="undo()" style="display:none;background:#1d4ed8;border-color:#3b82f6;color:#fff;font-weight:700">« Deshacer</button>
      <button class="sec" onclick="document.getElementById('imp').click()">Importar</button>
      <button class="sec" onclick="recuperarDatos()" title="Forzar recarga desde servidor">🔄 Recuperar</button>
      <button class="sec" id="btn-cal" onclick="toggleCal()">📅 Semana</button>
      <span class="saved" id="saved"></span>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="root"></div>
    <div id="cal-panel" style="display:none;margin-top:18px"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lb" class="lightbox" onclick="this.classList.remove('show')">
  <img id="lbi">
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- ExcelJS para exportar Excel en el browser -->
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<!-- App JS -->
<script src="ciaber_app.js"></script>
</body>
</html>
