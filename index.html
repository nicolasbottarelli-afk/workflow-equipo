<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Harf-Tele — Gestión</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231d4ed8'/%3E%3Crect x='28' y='20' width='44' height='56' rx='6' fill='%23fff'/%3E%3Crect x='38' y='14' width='24' height='12' rx='4' fill='%23bfdbfe'/%3E%3Crect x='34' y='40' width='32' height='4' rx='2' fill='%231d4ed8'/%3E%3Crect x='34' y='52' width='24' height='4' rx='2' fill='%231d4ed8'/%3E%3Crect x='34' y='64' width='20' height='4' rx='2' fill='%231d4ed8'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="ciaber_app.css">

  <!-- Firebase v9 modular (compat layer para uso global) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#1e3a6e"/>
        <rect x="11" y="8" width="18" height="22" rx="3" fill="white"/>
        <rect x="15" y="6" width="10" height="5" rx="2" fill="#93c5fd"/>
        <rect x="13" y="16" width="14" height="2" rx="1" fill="#1e3a6e"/>
        <rect x="13" y="21" width="10" height="2" rx="1" fill="#1e3a6e"/>
        <rect x="13" y="26" width="7" height="2" rx="1" fill="#1e3a6e"/>
      </svg>
    </div>
    <h2>Harf-Tele</h2>
    <p>Proyectos · Instalaciones · Consultorías</p>
    <input id="l-email" type="email" placeholder="Email" autocomplete="email"
      onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
    <input id="l-pass" type="password" placeholder="Contraseña" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" id="l-btn" onclick="doLogin()">Ingresar</button>
    <div id="l-err"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="app-header">
    <div class="topbar">
      <h1 class="topbar-logo">Harf-Tele</h1>
      <div class="breadcrumb" id="breadcrumb">
        <span class="cur">Clientes</span>
      </div>
    </div>
    <div class="header-right">
      <span class="sync-dot off" id="sync-dot" title="Estado de conexión"></span>
      <span class="sync-label err" id="sync-label">Conectando...</span>
      <span class="user-pill" id="user-email"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="app-content">
    <!-- Filtros -->
    <div class="filtros">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="q" placeholder="Buscar...">
      </div>
      <select id="filtroEstado" onchange="renderVista()">
        <option value="">Todos los estados</option>
      </select>
      <select id="filtroAbono" onchange="renderVista()" style="display:none">
        <option value="">Abono / Sin Abono</option>
        <option value="Abono">Con Abono</option>
        <option value="Sin Abono">Sin Abono</option>
      </select>
      <span id="filtroCount" class="filtro-count"></span>
    </div>

    <!-- Barra de acciones -->
    <div class="actbar">
      <button class="add-main" id="btn-add" onclick="addItem()">+ Nuevo Cliente</button>
      <div class="actbar-group">
        <button class="sec" onclick="exportJSON()" title="Descargar backup JSON">⬇ Backup</button>
        <button class="sec" onclick="document.getElementById('imp').click()" title="Importar desde JSON">⬆ Importar</button>
        <button class="sec" id="btn-cal" onclick="toggleCal()">📅 Semana</button>
      </div>
      <button id="btn-del-sel" onclick="deleteSelected()">
        🗑 Eliminar (<span id="sel-count">0</span>)
      </button>
      <button class="sec" id="btn-undo" onclick="undo()" style="display:none">« Deshacer</button>
      <span class="saved" id="saved"></span>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>

    <div id="root"></div>
    <div id="cal-panel" style="display:none;margin-top:18px"></div>
  </div>
</div>

<!-- Lightbox para imágenes -->
<div id="lb" class="lightbox" onclick="this.classList.remove('show')">
  <img id="lbi" alt="Adjunto">
</div>

<!-- Toast de notificaciones -->
<div id="toast-container"></div>

<script src="ciaber_app.js"></script>
</body>
</html>
