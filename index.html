<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow Equipo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff5a;
    --accent2: #5affd6;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5a5a;
    --pending: #888;
    --progress: #5ab4ff;
    --done: #5affd6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .logo span { color: var(--muted); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  button {
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    font-size: 14px;
    border-radius: 8px;
    padding: 8px 16px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
    font-weight: 600;
  }
  .btn-primary:hover { background: #d4eb3a; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { border-color: var(--muted); background: var(--surface2); }
  .btn-gmail {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-gmail:hover { border-color: var(--accent2); background: rgba(90,255,214,0.05); }
  main { max-width: 900px; margin: 0 auto; padding: 2rem; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
  }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; }
  .stat-num.pending { color: var(--pending); }
  .stat-num.progress { color: var(--progress); }
  .stat-num.done { color: var(--done); }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .toolbar select {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .spacer { flex: 1; }
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .task-card:hover { border-color: #444; }
  .task-card.done-card { opacity: 0.55; }
  .task-info { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-card.done-card .task-title { text-decoration: line-through; color: var(--muted); }
  .task-desc { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }
  .badge.pending { background: rgba(136,136,136,0.15); color: var(--pending); }
  .badge.progress { background: rgba(90,180,255,0.15); color: var(--progress); }
  .badge.done { background: rgba(90,255,214,0.15); color: var(--done); }
  .badge.person {
    background: rgba(232,255,90,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,255,90,0.2);
  }
  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .task-actions select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-delete {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 13px;
  }
  .btn-delete:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,90,90,0.05); }
  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    width: 100%;
    max-width: 460px;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .firebase-status {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .firebase-status.ok { background: rgba(90,255,214,0.1); color: var(--done); }
  .firebase-status.error { background: rgba(255,90,90,0.1); color: var(--danger); }
  .firebase-status.loading { background: rgba(136,136,136,0.1); color: var(--muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    z-index: 200;
    animation: slideUp 0.2s ease;
    max-width: 280px;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">workflow<span>/equipo</span></div>
  <div class="header-right">
    <div id="fbStatus" class="firebase-status loading"><span class="dot"></span> conectando...</div>
    <button class="btn-gmail" onclick="sendGmailReport()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      Enviar avance por Gmail
    </button>
    <button class="btn-primary" onclick="openModal()">+ Nueva tarea</button>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Pendientes</div>
      <div class="stat-num pending" id="countPending">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">En progreso</div>
      <div class="stat-num progress" id="countProgress">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Completadas</div>
      <div class="stat-num done" id="countDone">0</div>
    </div>
  </div>

  <div class="toolbar">
    <select id="filterStatus" onchange="renderTasks()">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="progreso">En progreso</option>
      <option value="listo">Listo</option>
    </select>
    <select id="filterPerson" onchange="renderTasks()">
      <option value="">Todas las personas</option>
    </select>
    <div class="spacer"></div>
  </div>

  <div class="task-list" id="taskList">
    <div class="empty">Cargando tareas...</div>
  </div>
</main>

<!-- Modal nueva tarea -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2>Nueva tarea</h2>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="inputTitle" placeholder="Ej: Revisar presupuesto">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="inputDesc" placeholder="Detalle de la tarea..."></textarea>
    </div>
    <div class="form-group">
      <label>Responsable</label>
      <input type="text" id="inputPerson" placeholder="Ej: María, Juan...">
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select id="inputStatus">
        <option value="pendiente">Pendiente</option>
        <option value="progreso">En progreso</option>
        <option value="listo">Listo</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveTask()">Guardar tarea</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDijZ5KYg1OPcSJnDsQh9pxtH_cr_xobRU",
  authDomain: "workflow-equipo.firebaseapp.com",
  databaseURL: "https://workflow-equipo-default-rtdb.firebaseio.com",
  projectId: "workflow-equipo",
  storageBucket: "workflow-equipo.firebasestorage.app",
  messagingSenderId: "974073018957",
  appId: "1:974073018957:web:9200142d312802f74d3a04"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tasksRef = ref(db, 'tareas');

let allTasks = {};

const fbStatus = document.getElementById('fbStatus');

onValue(tasksRef, (snapshot) => {
  fbStatus.className = 'firebase-status ok';
  fbStatus.innerHTML = '<span class="dot"></span> Firebase conectado';
  allTasks = snapshot.val() || {};
  renderTasks();
  updatePersonFilter();
}, (error) => {
  fbStatus.className = 'firebase-status error';
  fbStatus.innerHTML = '<span class="dot"></span> Error de conexión';
  console.error(error);
});

window.openModal = () => {
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('inputTitle').focus();
};
window.closeModal = () => {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputPerson').value = '';
  document.getElementById('inputStatus').value = 'pendiente';
};

window.saveTask = () => {
  const title = document.getElementById('inputTitle').value.trim();
  const desc = document.getElementById('inputDesc').value.trim();
  const person = document.getElementById('inputPerson').value.trim();
  const status = document.getElementById('inputStatus').value;
  if (!title) { showToast('Ingresá un título'); return; }
  push(tasksRef, {
    title, desc, person, status,
    createdAt: new Date().toISOString()
  });
  closeModal();
  showToast('Tarea guardada en Firebase ✓');
};

window.changeStatus = (id, val) => {
  update(ref(db, 'tareas/' + id), { status: val });
};

window.deleteTask = (id) => {
  if (confirm('¿Eliminar esta tarea?')) {
    remove(ref(db, 'tareas/' + id));
    showToast('Tarea eliminada');
  }
};

window.renderTasks = () => {
  const filterStatus = document.getElementById('filterStatus').value;
  const filterPerson = document.getElementById('filterPerson').value;
  const list = document.getElementById('taskList');

  let tasks = Object.entries(allTasks).map(([id, t]) => ({ id, ...t }));
  if (filterStatus) tasks = tasks.filter(t => t.status === filterStatus);
  if (filterPerson) tasks = tasks.filter(t => t.person === filterPerson);

  updateStats();

  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty">No hay tareas todavía. ¡Creá la primera!</div>';
    return;
  }

  const statusLabel = { pendiente: 'Pendiente', progreso: 'En progreso', listo: 'Listo' };
  list.innerHTML = tasks.map(t => `
    <div class="task-card ${t.status === 'listo' ? 'done-card' : ''}">
      <div class="task-info">
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
        <div class="task-meta">
          <span class="badge ${t.status}">${statusLabel[t.status] || t.status}</span>
          ${t.person ? `<span class="badge person">${escHtml(t.person)}</span>` : ''}
          <span style="font-size:11px;color:var(--muted)">${formatDate(t.createdAt)}</span>
        </div>
      </div>
      <div class="task-actions">
        <select onchange="changeStatus('${t.id}', this.value)">
          <option value="pendiente" ${t.status==='pendiente'?'selected':''}>Pendiente</option>
          <option value="progreso" ${t.status==='progreso'?'selected':''}>En progreso</option>
          <option value="listo" ${t.status==='listo'?'selected':''}>Listo</option>
        </select>
        <button class="btn-delete" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');
};

function updateStats() {
  const tasks = Object.values(allTasks);
  document.getElementById('countPending').textContent = tasks.filter(t => t.status === 'pendiente').length;
  document.getElementById('countProgress').textContent = tasks.filter(t => t.status === 'progreso').length;
  document.getElementById('countDone').textContent = tasks.filter(t => t.status === 'listo').length;
}

function updatePersonFilter() {
  const people = [...new Set(Object.values(allTasks).map(t => t.person).filter(Boolean))];
  const sel = document.getElementById('filterPerson');
  const current = sel.value;
  sel.innerHTML = '<option value="">Todas las personas</option>' +
    people.map(p => `<option value="${escHtml(p)}" ${current===p?'selected':''}>${escHtml(p)}</option>`).join('');
}

window.sendGmailReport = () => {
  const tasks = Object.values(allTasks);
  if (tasks.length === 0) { showToast('No hay tareas para enviar'); return; }

  const pending = tasks.filter(t => t.status === 'pendiente');
  const progress = tasks.filter(t => t.status === 'progreso');
  const done = tasks.filter(t => t.status === 'listo');

  const formatList = arr => arr.length
    ? arr.map(t => `• ${t.title}${t.person ? ' (' + t.person + ')' : ''}`).join('\n')
    : '  (ninguna)';

  const body = `REPORTE DE AVANCE - WORKFLOW EQUIPO
${new Date().toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}

RESUMEN:
  Pendientes: ${pending.length}
  En progreso: ${progress.length}
  Completadas: ${done.length}
  Total: ${tasks.length}

PENDIENTES:
${formatList(pending)}

EN PROGRESO:
${formatList(progress)}

COMPLETADAS:
${formatList(done)}

---
Enviado desde Workflow Equipo`;

  const subject = `Avance del equipo - ${new Date().toLocaleDateString('es-AR')}`;
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
  showToast('Abriendo Gmail con el reporte ✓');
};

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' });
}

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
</html>
